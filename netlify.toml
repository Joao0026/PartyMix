# Netlify — frontend (React/Vite)
# Site settings → Build: usa este ficheiro automaticamente.
# Env obrigatória: VITE_API_BASE_URL=https://SEU-BACKEND.onrender.com/api

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
